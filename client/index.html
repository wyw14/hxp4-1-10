<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>色彩记忆游戏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎨 色彩记忆游戏</h1>
    
    <div class="scores">
      <div class="score-item">
        <span class="score-label">当前关卡</span>
        <span id="current-level" class="score-value">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">最高记录</span>
        <span id="high-score" class="score-value">0</span>
      </div>
    </div>

    <div class="difficulty-panel">
      <div class="difficulty-header">
        <span class="difficulty-label">⚡ 动态难度</span>
        <span id="difficulty-level" class="difficulty-level">标准</span>
      </div>
      <div class="difficulty-info">
        <div class="speed-indicator">
          <span class="speed-label">亮灯速度</span>
          <span id="speed-value" class="speed-value">100%</span>
        </div>
        <div class="recent-scores">
          <span class="recent-label">最近三局</span>
          <div id="recent-scores-list" class="recent-scores-list">
            <span class="recent-score empty">-</span>
            <span class="recent-score empty">-</span>
            <span class="recent-score empty">-</span>
          </div>
        </div>
      </div>
      <div id="difficulty-reason" class="difficulty-reason">暂无数据，使用默认速度</div>
    </div>

    <div id="game-status" class="game-status">点击开始按钮开始游戏</div>

    <div class="game-board">
      <button class="color-btn red" data-color="red"></button>
      <button class="color-btn yellow" data-color="yellow"></button>
      <button class="color-btn blue" data-color="blue"></button>
      <button class="color-btn green" data-color="green"></button>
    </div>

    <div class="controls">
      <button id="start-btn" class="start-btn">开始游戏</button>
    </div>

    <div class="instructions">
      <h3>游戏规则</h3>
      <p>1. 观察亮起的按钮顺序</p>
      <p>2. 按相同顺序点击按钮</p>
      <p>3. 每过一关，序列增加一个</p>
      <p>4. 按错一次即游戏结束</p>
      <p>5. 系统根据最近三局表现自动调整难度：连续进步加快速度，连续低分放慢速度</p>
    </div>
  </div>

  <script type="module" src="game.ts"></script>
</body>
</html>
